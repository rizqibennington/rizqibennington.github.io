name: Deploy to VPS

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Sesuaikan path ini dengan lokasi folder project di VPS kamu
            cd /home/ubuntu/rizqibennington
            
            # Pull perubahan terbaru
            git config --global --add safe.directory /home/ubuntu/rizqibennington
            git pull origin master
            
            # Build ulang dan restart container (tanpa downtime lama)
            docker compose up -d --build web
            docker compose up -d certbot
            if [ -f ./ytclip/Dockerfile ]; then
              docker compose up -d --build ytclip
            fi
