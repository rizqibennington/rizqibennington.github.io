version: '3.8'

services:
  web:
    container_name: web-rizqi
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./portfolio-nextjs/out:/usr/share/nginx/html:ro
      # Kalau ada config nginx custom:
      # - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
