server {
    listen 80;
    server_name rizqibennington.com www.rizqibennington.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rizqibennington.com www.rizqibennington.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/rizqibennington.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rizqibennington.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /turnbasedgame {
        alias /usr/share/nginx/html/turnBasedGame;
        index index.html;
        try_files $uri $uri/ /turnBasedGame/index.html;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name app.rizqibennington.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.rizqibennington.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/rizqibennington.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rizqibennington.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /apps/index.html;
    }
}
