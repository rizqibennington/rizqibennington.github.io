server {
    listen 80;
    server_name rizqibennington.com www.rizqibennington.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name rizqibennington.com www.rizqibennington.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/rizqibennington.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rizqibennington.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /apps/ytclipper {
        return 301 /apps/ytclip/;
    }

    location ^~ /apps/ytclipper/ {
        rewrite ^/apps/ytclipper/(.*)$ /apps/ytclip/$1 permanent;
    }

    location = /apps/ytclip {
        return 301 /apps/ytclip/;
    }

    location ^~ /apps/ytclip/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /apps/ytclip;
        proxy_pass http://ytclip:5000/;
        proxy_redirect off;
    }

    location = /turnbasedgame {
        return 301 /apps/turnbasedgame/;
    }

    location ^~ /turnbasedgame/ {
        return 301 /apps$request_uri;
    }

    location = /apps/turnbasedgame {
        return 301 /apps/turnbasedgame/;
    }

    location ^~ /apps/turnbasedgame/ {
        alias /usr/share/nginx/html/turnBasedGame/;
        index index.html;
        try_files $uri $uri/ /apps/turnbasedgame/index.html;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
